name: scrape-events

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  scrape:
    name: scrape-and-write-review-table
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 1 * * *'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: install-dependencies
        run: pip install -r requirements.txt

      - name: restore-state-cache
        uses: actions/cache@v4
        with:
          path: |
            .translation_cache.json
            .enrich_cache.json
            .source_health.json
          key: scraper-state-${{ github.run_id }}
          restore-keys: |
            scraper-state-

      - name: run-pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.4-mini
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
          OUTPUT_DIR: out
        run: python run.py

      - name: upload-artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: events-${{ github.run_id }}
          path: out/
          retention-days: 14
