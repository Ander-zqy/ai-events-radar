name: scrape-events

on:
  schedule:
    # GitHub Actions 的 cron 是 UTC!  0 1 * * * = 每天 01:00 UTC = 09:00 北京
    - cron: "0 1 * * *"
  workflow_dispatch: {}        # 支持手动触发(测试用)

permissions:
  contents: read               # 用 artifact 存产出,不写仓库;要改成提交回仓库再开 write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安装依赖
        run: pip install -r requirements.txt

      # 状态文件(翻译/详情缓存、哨兵基线)在一次性 runner 上会消失。
      # 这只是优化,丢了不影响正确性;这里尽量留住:用唯一 key 写新缓存,
      # 用 restore-keys 前缀恢复最近一次(滚动缓存惯用法)。
      - name: 恢复状态缓存
        uses: actions/cache@v4
        with:
          path: |
            .translation_cache.json
            .enrich_cache.json
            .source_health.json
          key: scraper-state-${{ github.run_id }}
          restore-keys: |
            scraper-state-

      - name: 跑管道
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # 没设也能跑,只是跳过翻译
          OUTPUT_DIR: out
        run: python run.py

      # 即使哨兵把这次判失败(某源归零),也上传产出便于排查
      - name: 上传产出
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: events-${{ github.run_id }}
          path: out/
          retention-days: 14
